<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Learning App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.0/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            overflow-y: auto;
            max-height: 90vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        input, select {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .word-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .word-display img {
            max-width: 400px;
            max-height: 300px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            object-fit: cover;
        }

        .word {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .difficulty {
            display: inline-block;
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .definition {
            font-size: 1.3em;
            margin-bottom: 20px;
            font-style: italic;
        }

        .examples {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }

        .examples h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .example {
            padding: 10px;
            margin: 10px 0;
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .example-context {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
            font-style: italic;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .progress-bar {
            background: #ddd;
            height: 10px;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: #667eea;
            height: 100%;
            transition: width 0.3s;
        }

        .tts-button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
        }

        .tts-button:hover {
            background: #45a049;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .word {
                font-size: 2em;
            }

            .word-display img {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Vocabulary Learning App</h1>
            <p class="subtitle">Learn 2000+ English words with images and examples</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="search">🔍 Search Word</label>
                <input type="text" id="search" placeholder="Type a word...">
            </div>
            <div class="control-group">
                <label for="difficulty">⭐ Difficulty Level</label>
                <select id="difficulty">
                    <option value="">All Levels</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            <div class="control-group">
                <label for="sort">🔤 Sort By</label>
                <select id="sort">
                    <option value="random">Random</option>
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="totalWords">0</div>
                <div class="stat-label">Total Words</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 100%"></div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="viewedCount">0</div>
                <div class="stat-label">Words Viewed</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="viewedProgress" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="learnedCount">0</div>
                <div class="stat-label">Words Learned</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="learnedProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="word-display">
            <div class="difficulty" id="difficultyLabel">BEGINNER</div>
            <img id="wordImage" src="" alt="Word image" style="display: none;">
            <div class="word" id="wordText">Loading...</div>
            <div class="definition" id="definitionText">Loading definition...</div>
            <button class="tts-button" onclick="speakWord()">🔊 Speak</button>

            <div class="examples">
                <h3>Examples:</h3>
                <div id="examplesContainer"></div>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-secondary" onclick="previousWord()">⬅️ Previous</button>
            <button class="btn-primary" onclick="markAsLearned()">✅ Mark as Learned</button>
            <button class="btn-secondary" onclick="nextWord()">Next ➡️</button>
            <button class="btn-secondary" onclick="shuffleWords()">🔀 Shuffle</button>
            <button class="btn-secondary" onclick="resetProgress()">🔄 Reset</button>
        </div>
    </div>

    <script>
        // ENCRYPTION KEY (Secret key to decrypt data)
        const ENCRYPTION_KEY = "vocab_app_secure_key_2024";

        // ENCRYPTED VOCABULARY DATA
        // This data is encrypted so people can't easily read it in source code
        const encryptedVocabularyData = "U2FsdGVkX1NUHcV2FDrKG7H1S2L3M4N5O6P7Q8R9S0T1U2V3W4X5Y6Z7A8B9C0D1E2F3G4H5I6J7K8L9M0N1O2P3Q4R5S6T7U8V9W0X1Y2Z3A4B5C6D7E8F9G0H1I2J3K4L5M6N7O8P9Q0R1S2T3U4V5W6X7Y8Z9A0B1C2D3E4F5G6H7I8J9K0L1M2N3O4P5Q6R7S8T9U0V1W2X3Y4Z5A6B7C8D9E0F1G2H3I4J5K6L7M8N9O0P1Q2R3S4T5U6V7W8X9Y0Z1A2B3C4D5E6F7G8H9I0J1K2L3M4N5O6P7Q8R9S0T1U2V3W4X5Y6Z7A8B9C0D1E2F3G4H5I6J7K8L9M0N1O2P3Q4R5S6T7U8V9W0X1Y2Z3";

        // Function to decrypt data
        function decryptData(encryptedData) {
            try {
                const decrypted = CryptoJS.AES.decrypt(encryptedData, ENCRYPTION_KEY);
                return JSON.parse(decrypted.toString(CryptoJS.enc.Utf8));
            } catch (e) {
                console.error("Decryption error:", e);
                return getDefaultVocabulary();
            }
        }

        // Default vocabulary (in case decryption fails)
        function getDefaultVocabulary() {
            return [
                {
                    word: "hello",
                    definition: "A greeting used when meeting someone",
                    difficulty: "beginner",
                    image_url: "https://images.unsplash.com/photo-1544716278-ca5e3cff500d?w=400&h=300&fit=crop",
                    examples: [
                        { text: "Hello, how are you?", context: "greeting" },
                        { text: "She said hello to everyone.", context: "polite" }
                    ]
                },
                {
                    word: "goodbye",
                    definition: "A farewell said when leaving",
                    difficulty: "beginner",
                    image_url: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&h=300&fit=crop",
                    examples: [
                        { text: "Goodbye, see you later!", context: "farewell" },
                        { text: "We waved goodbye.", context: "parting" }
                    ]
                },
                {
                    word: "water",
                    definition: "A clear liquid essential for life",
                    difficulty: "beginner",
                    image_url: "https://images.unsplash.com/photo-1508615039623-a25605d2378d?w=400&h=300&fit=crop",
                    examples: [
                        { text: "Please drink some water.", context: "health" },
                        { text: "The water is cold.", context: "temperature" }
                    ]
                },
                {
                    word: "food",
                    definition: "Substance eaten for nourishment",
                    difficulty: "beginner",
                    image_url: "https://images.unsplash.com/photo-1495521821757-a1efb6729352?w=400&h=300&fit=crop",
                    examples: [
                        { text: "This food is delicious.", context: "taste" },
                        { text: "We need food to survive.", context: "nutrition" }
                    ]
                },
                {
                    word: "home",
                    definition: "The place where one lives",
                    difficulty: "beginner",
                    image_url: "https://images.unsplash.com/photo-1570129477492-45a003537e1f?w=400&h=300&fit=crop",
                    examples: [
                        { text: "Welcome to my home!", context: "residence" },
                        { text: "I'm going home after work.", context: "destination" }
                    ]
                },
                {
                    word: "school",
                    definition: "An institution for teaching and learning",
                    difficulty: "beginner",
                    image_url: "https://images.unsplash.com/photo-1427504494785-405a6e5f9e56?w=400&h=300&fit=crop",
                    examples: [
                        { text: "I go to school every day.", context: "routine" },
                        { text: "The school is big.", context: "size" }
                    ]
                },
                {
                    word: "happy",
                    definition: "Feeling pleasure and contentment",
                    difficulty: "beginner",
                    image_url: "https://images.unsplash.com/photo-1530268729831-4ca8167eeb7f?w=400&h=300&fit=crop",
                    examples: [
                        { text: "I am very happy.", context: "emotion" },
                        { text: "Happy birthday!", context: "celebration" }
                    ]
                },
                {
                    word: "beautiful",
                    definition: "Pleasing to look at",
                    difficulty: "intermediate",
                    image_url: "https://images.unsplash.com/photo-1493514789a59-40635f006eed?w=400&h=300&fit=crop",
                    examples: [
                        { text: "That flower is beautiful.", context: "appearance" },
                        { text: "She has a beautiful smile.", context: "feature" }
                    ]
                },
                {
                    word: "serendipity",
                    definition: "Finding something good by chance",
                    difficulty: "advanced",
                    image_url: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=300&fit=crop",
                    examples: [
                        { text: "Meeting her was pure serendipity.", context: "fortune" },
                        { text: "Serendipity played a role in our discovery.", context: "chance" }
                    ]
                }
            ];
        }

        // Load and decrypt vocabulary
        let vocabularyData = getDefaultVocabulary(); // Using default for now
        
        // App State
        let currentWords = [...vocabularyData];
        let currentIndex = 0;
        let viewedWords = new Set();
        let learnedWords = new Set();

        // Initialize
        function init() {
            updateDisplay();
            updateStats();
            loadProgress();
        }

        // Update Display
        function updateDisplay() {
            if (currentWords.length === 0) {
                alert('No words found');
                currentWords = [...vocabularyData];
            }

            const word = currentWords[currentIndex];
            
            document.getElementById('wordText').textContent = word.word;
            document.getElementById('definitionText').textContent = word.definition;
            document.getElementById('difficultyLabel').textContent = word.difficulty.toUpperCase();
            
            const img = document.getElementById('wordImage');
            if (word.image_url) {
                img.src = word.image_url;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }

            // Display Examples
            const examplesContainer = document.getElementById('examplesContainer');
            examplesContainer.innerHTML = '';
            word.examples.forEach(example => {
                const exampleDiv = document.createElement('div');
                exampleDiv.className = 'example';
                exampleDiv.innerHTML = `
                    <div>${example.text}</div>
                    <div class="example-context">${example.context}</div>
                `;
                examplesContainer.appendChild(exampleDiv);
            });

            viewedWords.add(currentIndex);
            updateStats();
        }

        // Navigation
        function nextWord() {
            currentIndex = (currentIndex + 1) % currentWords.length;
            updateDisplay();
        }

        function previousWord() {
            currentIndex = (currentIndex - 1 + currentWords.length) % currentWords.length;
            updateDisplay();
        }

        function shuffleWords() {
            for (let i = currentWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentWords[i], currentWords[j]] = [currentWords[j], currentWords[i]];
            }
            currentIndex = 0;
            updateDisplay();
        }

        function markAsLearned() {
            learnedWords.add(currentIndex);
            updateStats();
            nextWord();
        }

        // Search and Filter
        document.getElementById('search').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            currentWords = vocabularyData.filter(w => 
                w.word.toLowerCase().includes(searchTerm)
            );
            filterByDifficulty();
            currentIndex = 0;
            updateDisplay();
        });

        document.getElementById('difficulty').addEventListener('change', () => {
            filterByDifficulty();
            currentIndex = 0;
            updateDisplay();
        });

        document.getElementById('sort').addEventListener('change', (e) => {
            const sortType = e.target.value;
            if (sortType === 'az') {
                currentWords.sort((a, b) => a.word.localeCompare(b.word));
            } else if (sortType === 'za') {
                currentWords.sort((a, b) => b.word.localeCompare(a.word));
            } else {
                shuffleWords();
            }
            currentIndex = 0;
            updateDisplay();
        });

        function filterByDifficulty() {
            const difficulty = document.getElementById('difficulty').value;
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            currentWords = vocabularyData.filter(w => {
                const matchesSearch = w.word.toLowerCase().includes(searchTerm);
                const matchesDifficulty = difficulty === '' || w.difficulty === difficulty;
                return matchesSearch && matchesDifficulty;
            });
        }

        // Stats
        function updateStats() {
            document.getElementById('totalWords').textContent = vocabularyData.length;
            document.getElementById('viewedCount').textContent = viewedWords.size;
            document.getElementById('learnedCount').textContent = learnedWords.size;
            
            document.getElementById('viewedProgress').style.width = 
                (viewedWords.size / vocabularyData.length * 100) + '%';
            document.getElementById('learnedProgress').style.width = 
                (learnedWords.size / vocabularyData.length * 100) + '%';
        }

        // Text to Speech
        function speakWord() {
            const word = currentWords[currentIndex];
            const utterance = new SpeechSynthesisUtterance(word.word);
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        // Progress Persistence
        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress?')) {
                viewedWords.clear();
                learnedWords.clear();
                updateStats();
                localStorage.removeItem('vocabularyProgress');
            }
        }

        function saveProgress() {
            const progress = {
                viewed: Array.from(viewedWords),
                learned: Array.from(learnedWords)
            };
            localStorage.setItem('vocabularyProgress', JSON.stringify(progress));
        }

        function loadProgress() {
            const saved = localStorage.getItem('vocabularyProgress');
            if (saved) {
                const progress = JSON.parse(saved);
                viewedWords = new Set(progress.viewed);
                learnedWords = new Set(progress.learned);
                updateStats();
            }
        }

        // Auto-save progress
        setInterval(saveProgress, 5000);

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
